<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI가 상황에 맞춰 OOTD를 분석하고 스타일 피드백을 제공합니다." />
    <meta name="theme-color" content="#eae6ff" />
    <title>FitCheck! — AI OOTD 분석</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <header class="site-header">
      <button class="logo card" type="button" data-action="reset" aria-label="처음으로">FITCHECK!</button>
    </header>

    <main class="app-shell">
      <section id="upload-screen" class="screen" aria-labelledby="upload-title">
        <p class="notice card">다른 사람 눈 테러하기 전에 패션 점검부터 하세요.</p>
        <aside id="challenge" class="challenge card" hidden></aside>

        <label class="upload-card card" for="image-input">
          <input id="image-input" type="file" accept="image/jpeg,image/png,image/webp" hidden />
          <span id="upload-prompt">
            <span class="camera" aria-hidden="true">＋</span>
            <strong id="upload-title">OOTD<br />업로드</strong>
            <small>사진을 찍거나 갤러리에서 선택하세요</small>
          </span>
          <img id="image-preview" alt="업로드한 OOTD 미리보기" hidden />
          <span class="sticker">도전!</span>
        </label>

        <fieldset>
          <legend>상황(TPO) 선택</legend>
          <div id="tpo-options" class="chips"></div>
        </fieldset>

        <button id="analyze-button" class="primary-button card" type="button" disabled>패션력 측정하기</button>
        <p class="privacy-note">사진은 분석 요청에만 사용되며 서버에 저장하지 않습니다.</p>
      </section>

      <section id="loading-screen" class="screen card loading" hidden aria-live="polite">
        <div class="spinner" aria-hidden="true">✦</div>
        <h2>OOTD 스캔 중...</h2>
        <p id="loading-message">실루엣과 컬러 조합을 확인하고 있어요.</p>
        <progress max="100"></progress>
      </section>

      <section id="result-screen" class="screen" hidden aria-labelledby="result-title">
        <article class="result-card card">
          <header><h2 id="result-title">FITCHECK! RESULT</h2><span id="tier" class="badge"></span></header>
          <div class="result-image-wrap">
            <img id="result-image" alt="분석한 OOTD" />
            <span id="best-pin" class="pin best">GOOD</span>
            <span id="worst-pin" class="pin worst">FIX</span>
          </div>
          <div class="score"><strong id="score"></strong><span>/ 10,000 PTS</span></div>
          <p id="roast" class="roast"></p>
          <div id="stats" class="stats"></div>
          <div class="feedback-grid">
            <div><strong>잘 어울리는 포인트</strong><p id="best-match"></p></div>
            <div><strong>보완할 포인트</strong><p id="worst-match"></p></div>
          </div>
        </article>
        <p id="battle-result" class="battle-result card" hidden></p>
        <div class="actions">
          <button class="primary-button card" type="button" data-action="share">결과 이미지 저장</button>
          <button class="secondary-button card" type="button" data-action="copy">대결 링크 복사</button>
          <button class="secondary-button card" type="button" data-action="reset">다시 측정하기</button>
        </div>
      </section>
    </main>
    <div id="toast" class="toast card" role="status" hidden></div>
  </body>
</html>
